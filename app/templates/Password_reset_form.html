<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f3;
      font-family: 'DM Sans', sans-serif;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e2df;
      border-radius: 14px;
      padding: 2rem 2rem 1.75rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    .icon-ring {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #f5f5f3;
      border: 1px solid #e2e2df;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }
    .icon-ring i { font-size: 22px; color: #888; }

    h2 {
      font-size: 18px;
      font-weight: 500;
      text-align: center;
      color: #111;
      margin-bottom: .4rem;
    }

    .sub {
      font-size: 13px;
      color: #888;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #888;
      margin-bottom: .4rem;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .input-wrap { position: relative; }

    input[type=password],
    input[type=text] {
      width: 100%;
      background: #f9f9f8;
      border: 1px solid #e2e2df;
      border-radius: 8px;
      padding: .6rem .75rem .6rem 2.4rem;
      font-size: 14px;
      font-family: 'DM Mono', monospace;
      color: #111;
      outline: none;
      transition: border .15s, box-shadow .15s;
    }
    input:focus {
      border-color: #aaa;
      box-shadow: 0 0 0 3px rgba(0,0,0,.07);
    }

    .field-icon {
      position: absolute;
      left: .7rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #bbb;
      pointer-events: none;
    }

    .toggle {
      position: absolute;
      right: .7rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: #bbb;
      font-size: 16px;
      line-height: 1;
    }
    .toggle:hover { color: #555; }

    .strength-bar {
      height: 3px;
      border-radius: 2px;
      background: #e2e2df;
      margin-top: .5rem;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0;
      border-radius: 2px;
      transition: width .3s, background .3s;
    }
    .strength-hint {
      font-size: 11px;
      color: #bbb;
      margin-top: .3rem;
      min-height: 14px;
    }

    .req-list {
      margin-top: .75rem;
      margin-bottom: 1rem;
      padding: .75rem;
      background: #f9f9f8;
      border-radius: 8px;
      border: 1px solid #e2e2df;
    }
    .req {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: 12px;
      color: #aaa;
      margin-bottom: .3rem;
    }
    .req:last-child { margin-bottom: 0; }
    .req i { font-size: 13px; }
    .req.met { color: #1D9E75; }
    .req.met i::before { content: "\ea5e"; }

    .match-hint {
      font-size: 11px;
      margin-top: .3rem;
      min-height: 14px;
    }

    .btn {
      width: 100%;
      padding: .7rem;
      border-radius: 8px;
      background: #111;
      color: #fff;
      border: none;
      font-size: 14px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: .25rem;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .35; cursor: not-allowed; }

    .back {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      margin-top: 1rem;
      font-size: 13px;
      color: #888;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      padding: .4rem;
      font-family: 'DM Sans', sans-serif;
      text-decoration: none;
    }
    .back:hover { color: #111; }

    .success-state { display: none; text-align: center; padding: .5rem 0; }
    .success-state i { font-size: 36px; color: #1D9E75; margin-bottom: .75rem; display: block; }
    .success-state h2 { margin-bottom: .4rem; }
  </style>
</head>
<body>
  <div class="card">

    <div id="formState">
      <div class="icon-ring"><i class="ti ti-lock-open"></i></div>
      <h2>Reset your password</h2>
      <p class="sub">Choose a strong password to secure your account.</p>

      <div class="field">
        <label for="newPass">New password</label>
        <div class="input-wrap">
          <i class="ti ti-lock field-icon"></i>
          <input type="password" id="newPass" placeholder="••••••••" autocomplete="new-password" oninput="checkStrength(this.value)">
          <button class="toggle" type="button" onclick="toggleVis('newPass', this)" aria-label="Show password">
            <i class="ti ti-eye"></i>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="sBar"></div></div>
        <div class="strength-hint" id="sHint"></div>
      </div>

      <div class="req-list">
        <div class="req" id="r-len"><i class="ti ti-circle"></i> At least 8 characters</div>
        <div class="req" id="r-up"><i class="ti ti-circle"></i> One uppercase letter</div>
        <div class="req" id="r-num"><i class="ti ti-circle"></i> One number</div>
        <div class="req" id="r-sym"><i class="ti ti-circle"></i> One special character</div>
      </div>

      <div class="field">
        <label for="confPass">Confirm password</label>
        <div class="input-wrap">
          <i class="ti ti-lock-check field-icon"></i>
          <input type="password" id="confPass" placeholder="••••••••" autocomplete="new-password" oninput="checkMatch()">
          <button class="toggle" type="button" onclick="toggleVis('confPass', this)" aria-label="Show confirm password">
            <i class="ti ti-eye"></i>
          </button>
        </div>
        <div class="match-hint" id="matchHint"></div>
      </div>

      <button class="btn" id="submitBtn" type="button" disabled onclick="handleSubmit()">Reset password</button>
      <a href="/login" class="back"><i class="ti ti-arrow-left"></i> Back to login</a>
    </div>

    <div class="success-state" id="successState">
      <i class="ti ti-circle-check"></i>
      <h2>Password updated</h2>
      <p class="sub">Your password has been reset successfully. You can now sign in with your new password.</p>
      <a href="/login" class="btn" style="display:block;text-align:center;text-decoration:none;">Go to login</a>
    </div>

  </div>

  <script>
    function toggleVis(id, btn) {
      const el = document.getElementById(id);
      const isPass = el.type === 'password';
      el.type = isPass ? 'text' : 'password';
      btn.querySelector('i').className = isPass ? 'ti ti-eye-off' : 'ti ti-eye';
    }

    function checkStrength(val) {
      const reqs = {
        len: val.length >= 8,
        up: /[A-Z]/.test(val),
        num: /[0-9]/.test(val),
        sym: /[^A-Za-z0-9]/.test(val)
      };
      document.getElementById('r-len').className = 'req' + (reqs.len ? ' met' : '');
      document.getElementById('r-up').className  = 'req' + (reqs.up  ? ' met' : '');
      document.getElementById('r-num').className = 'req' + (reqs.num ? ' met' : '');
      document.getElementById('r-sym').className = 'req' + (reqs.sym ? ' met' : '');

      const score = Object.values(reqs).filter(Boolean).length;
      const map = [
        [0,   '',       0,   'transparent'],
        [1,   'Weak',   25,  '#E24B4A'],
        [2,   'Fair',   50,  '#EF9F27'],
        [3,   'Good',   75,  '#1D9E75'],
        [4,   'Strong', 100, '#1D9E75'],
      ];
      const [, label, pct, color] = map[score];
      const bar = document.getElementById('sBar');
      bar.style.width = pct + '%';
      bar.style.background = color;
      const hint = document.getElementById('sHint');
      hint.textContent = label;
      hint.style.color = color;
      checkMatch();
    }

    function checkMatch() {
      const p = document.getElementById('newPass').value;
      const c = document.getElementById('confPass').value;
      const hint = document.getElementById('matchHint');
      const btn  = document.getElementById('submitBtn');
      const allMet = p.length >= 8 && /[A-Z]/.test(p) && /[0-9]/.test(p) && /[^A-Za-z0-9]/.test(p);

      if (!c) { hint.textContent = ''; btn.disabled = true; return; }

      if (p === c && allMet) {
        hint.style.color = '#1D9E75';
        hint.textContent = 'Passwords match';
        btn.disabled = false;
      } else {
        hint.style.color = '#E24B4A';
        hint.textContent = p !== c ? 'Passwords do not match' : 'Requirements not met';
        btn.disabled = true;
      }
    }

    function handleSubmit() {
      document.getElementById('formState').style.display = 'none';
      document.getElementById('successState').style.display = 'block';
    }
  </script>
</body>
</html>
